<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capital Seafood CRM系统V1</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --panel-2: #eef4ee;
      --ink: #202621;
      --muted: #697166;
      --line: #dfe5dc;
      --line-strong: #c5d0c0;
      --green: #28724c;
      --green-2: #e4f2e9;
      --gold: #e9b949;
      --gold-2: #fff4cf;
      --blue: #315f8f;
      --blue-2: #e8f0f9;
      --red: #b94646;
      --red-2: #f9e8e8;
      --shadow: 0 18px 42px rgba(31, 41, 35, 0.08);
      --radius: 8px;
      font-family: Inter, "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 7px;
      min-height: 36px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover { border-color: var(--line-strong); }
    button.primary { background: var(--green); border-color: var(--green); color: #fff; }
    button.icon { width: 36px; padding: 0; display: inline-grid; place-items: center; }
    button.danger { color: var(--red); }

    input, select, textarea {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      min-height: 36px;
      padding: 7px 10px;
      width: 100%;
    }

    textarea { min-height: 88px; resize: vertical; }

    .app {
      display: grid;
      grid-template-columns: 232px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: #14251c;
      color: #f7fbf7;
      padding: 22px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 760;
      letter-spacing: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--gold);
      display: grid;
      place-items: center;
      color: #14251c;
      font-weight: 900;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      justify-content: flex-start;
      display: flex;
      gap: 10px;
      align-items: center;
      width: 100%;
      background: transparent;
      border-color: transparent;
      color: #c9d6ca;
      padding: 9px 10px;
      min-height: 40px;
    }

    .nav button.active {
      color: #14251c;
      background: #f4f7f1;
      border-color: #f4f7f1;
    }

    .sidebar-note {
      margin-top: auto;
      color: #aebcaf;
      font-size: 12px;
      line-height: 1.6;
      border-top: 1px solid rgba(255,255,255,0.12);
      padding-top: 16px;
    }

    main {
      min-width: 0;
      padding: 22px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      position: relative;
    }

    .menu-toggle {
      display: none;
    }

    .more-menu {
      position: absolute;
      right: 0;
      top: 42px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 190px;
      padding: 8px;
      z-index: 20;
      display: grid;
      gap: 6px;
    }

    .more-menu button {
      justify-content: flex-start;
      text-align: left;
      width: 100%;
    }

    .date-filter {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: auto minmax(130px, 170px) minmax(130px, 170px) minmax(0, 1fr);
      gap: 10px;
      align-items: end;
    }

    .field-label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .range-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      align-self: center;
      justify-self: end;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      min-width: 0;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .panel-body { padding: 16px; }

    .week-tools {
      display: grid;
      grid-template-columns: 150px auto auto;
      gap: 8px;
      align-items: center;
    }

    .schedule-actions {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    .action-group {
      position: relative;
    }

    .schedule-menu {
      top: 44px;
      right: 0;
      left: auto;
      bottom: auto;
    }

    .density-controls {
      display: grid;
      grid-template-columns: minmax(150px, 180px) repeat(4, minmax(120px, 1fr)) auto;
      gap: 10px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      background: #fbfcfa;
    }

    .density-controls label {
      color: var(--muted);
      font-size: 12px;
      display: grid;
      gap: 5px;
    }

    .density-controls input[type="range"] {
      padding: 0;
      min-height: 30px;
    }

    .display-settings-menu {
      min-width: 260px;
    }

    .display-settings-menu .density-controls {
      display: grid;
      grid-template-columns: 1fr;
      border: 0;
      padding: 0;
      background: transparent;
    }

    .schedule-wrap {
      overflow: auto;
      max-width: 100%;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    .schedule {
      min-width: 920px;
      table-layout: fixed;
      font-size: var(--schedule-font, 14px);
    }

    th, td {
      border: 1px solid var(--line);
      padding: 8px;
      vertical-align: top;
    }

    th {
      background: #f2f5ef;
      text-align: left;
      font-size: 12px;
      color: var(--muted);
      font-weight: 760;
    }

    .day-head {
      background: var(--gold);
      color: #162016;
      text-align: center;
    }

    .employee-cell {
      width: var(--employee-col-width, 124px);
      min-width: var(--employee-col-width, 124px);
      background: #fbfcfa;
      position: sticky;
      left: 0;
      z-index: 2;
    }

    .employee-cell.resizable {
      position: sticky;
    }

    .employee-resizer {
      position: absolute;
      top: 0;
      right: -4px;
      width: 8px;
      height: 100%;
      cursor: col-resize;
      opacity: 0;
      background: rgba(46, 94, 62, .18);
      transition: opacity .12s ease;
    }

    .employee-cell:hover .employee-resizer,
    .employee-resizer.is-dragging {
      opacity: 1;
    }

    .employee-name {
      font-weight: 760;
      margin-bottom: 8px;
    }

    .mini-row {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .shift-cell {
      height: var(--schedule-row-height, 78px);
      background: #fff;
    }

    .shift-card {
      display: grid;
      gap: 7px;
      min-height: calc(var(--schedule-row-height, 78px) - 16px);
    }

    .shift-view {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: start;
    }

    .shift-main {
      font-size: var(--schedule-font, 15px);
      font-weight: 800;
      line-height: 1.25;
    }

    .shift-detail {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      margin-top: 4px;
    }

    .edit-link {
      min-height: 28px;
      padding: 0 8px;
      font-size: 12px;
      color: var(--green);
      border-color: var(--line);
      background: #fbfdfb;
    }

    .blank-shift {
      min-height: 26px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 760;
      width: max-content;
    }

    .status.full { background: var(--green-2); color: var(--green); }
    .status.part { background: var(--blue-2); color: var(--blue); }
    .status.off { background: #f2f2ee; color: #80867d; }
    .status.changed { background: var(--red-2); color: var(--red); }

    .cell-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      background: #f8faf7;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
    }

    .cell-controls select,
    .cell-controls input {
      min-height: 30px;
      padding: 4px 6px;
      font-size: 12px;
    }

    .actual {
      grid-column: span 2;
    }

    .summary-list {
      display: grid;
      gap: 10px;
    }

    .metric {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      align-items: baseline;
    }

    .metric:last-child { border-bottom: 0; }
    .metric-label { color: var(--muted); font-size: 13px; }
    .metric-value { font-size: 20px; font-weight: 800; }

    .voice-box {
      display: grid;
      gap: 10px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .tabs {
      display: inline-flex;
      gap: 4px;
      background: #edf2ed;
      padding: 4px;
      border-radius: 8px;
    }

    .tabs button {
      border: 0;
      background: transparent;
      min-height: 30px;
      padding: 0 10px;
      font-size: 13px;
    }

    .tabs button.active {
      background: #fff;
      box-shadow: 0 1px 5px rgba(20, 37, 28, 0.08);
    }

    .hidden { display: none !important; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .form-grid .wide { grid-column: span 2; }

    .sales-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
    }

    .manual-sales-panel.hidden {
      display: none;
    }

    .sales-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .import-icon {
      width: 38px;
      min-height: 38px;
      padding: 0;
      font-size: 18px;
      justify-content: center;
    }

    .export-preview {
      border-top: 1px solid var(--line);
      background: #fbfcfa;
    }

    .export-preview img {
      width: 100%;
      max-width: 980px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .sales-main {
      display: grid;
      gap: 16px;
    }

    .toolbar-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #14251c;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      z-index: 80;
      font-size: 14px;
    }

    .mobile-backdrop {
      display: none;
    }

    .import-preview img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--line);
      margin-top: 10px;
    }

    .pivot-note {
      padding: 10px 12px;
      background: var(--blue-2);
      color: var(--blue);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    .subtabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .subtabs button.active {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .sales-table th,
    .sales-table td {
      padding: 10px;
      font-size: 13px;
    }

    .staff-table input {
      min-width: 160px;
    }

    .chart {
      display: grid;
      gap: 10px;
      padding-top: 8px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr) 92px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }

    .bar-track {
      height: 14px;
      background: #edf1ed;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      background: var(--green);
      border-radius: 999px;
      width: 0%;
      transition: width .2s ease;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      background: #f8faf7;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      line-height: 1.6;
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: fixed; top: 0; bottom: 0; left: 0; z-index: 60; width: 260px; transform: translateX(-100%); transition: transform .2s ease; }
      .sidebar.open { transform: translateX(0); }
      .nav { grid-auto-flow: column; overflow-x: auto; }
      .sidebar-note { display: none; }
      .grid, .sales-layout { grid-template-columns: 1fr; }
      .menu-toggle { display: inline-grid; }
      .mobile-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.28);
        z-index: 50;
      }
      .mobile-backdrop.open { display: block; }
    }

    @media (max-width: 720px) {
      main { padding: 14px; }
      .topbar { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .week-tools, .form-grid, .split, .date-filter, .density-controls { grid-template-columns: 1fr; }
      .schedule-actions {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr)) 42px;
      }
      .schedule-actions > .action-group > button {
        width: 100%;
        padding-left: 8px;
        padding-right: 8px;
      }
      .sales-head-actions {
        width: 100%;
        justify-content: space-between;
      }
      .subtabs {
        flex: 1;
      }
      .form-grid .wide { grid-column: auto; }
      h1 { font-size: 22px; }
      .schedule { min-width: 720px; }
      .employee-cell {
        width: var(--employee-col-width, 96px);
        min-width: var(--employee-col-width, 96px);
      }
      .panel-head { align-items: flex-start; flex-direction: column; }
      button { min-height: 42px; }
      input, select, textarea { min-height: 42px; font-size: 16px; }
      .more-menu {
        position: fixed;
        left: 14px;
        right: 14px;
        bottom: 14px;
        top: auto;
      }
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="mobile-backdrop" id="mobileBackdrop"></div>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="mark">C</div><span>Capital Seafood<br />CRM系统V1</span></div>
      <nav class="nav" aria-label="主导航">
        <button class="active" data-view="schedule">排班表</button>
        <button data-view="staff">人员管理</button>
        <button data-view="hours">工时统计</button>
        <button data-view="sales">业绩报表</button>
      </nav>
      <div class="sidebar-note">数据保存在当前浏览器。第一版适合门店内部试用，后续可升级为多人登录和云端同步。</div>
    </aside>

    <main>
      <section class="topbar">
        <div>
          <button class="icon menu-toggle" id="menuToggle">☰</button>
          <h1 id="pageTitle">Capital Seafood CRM系统V1</h1>
          <div class="subtitle" id="pageSubtitle">按员工和日期安排全天或兼职班次，并记录实际工作时长。</div>
        </div>
        <div class="actions">
          <button class="icon" id="moreActions">⋯</button>
          <div class="more-menu hidden" id="moreMenu">
            <button id="exportBtn">导出数据</button>
            <button id="saveBtn">保存当前版本</button>
            <button id="importDataBtn">导入数据</button>
            <button class="danger" id="clearDataBtn">清空本地数据</button>
          </div>
          <input class="hidden" type="file" id="importDataFile" accept=".json,application/json" />
        </div>
      </section>

      <section class="date-filter">
        <label class="field-label">查看方式
          <select id="rangeModeSelect">
            <option value="day">日</option>
            <option value="week">周</option>
            <option value="month">月</option>
            <option value="custom">自定义</option>
          </select>
        </label>
        <label class="field-label">开始日期<input type="date" id="rangeStart" /></label>
        <label class="field-label">结束日期<input type="date" id="rangeEnd" /></label>
        <div class="range-note" id="rangeNote"></div>
      </section>

      <section id="scheduleView" class="view">
        <div class="grid">
          <div class="panel">
            <div class="panel-head">
              <h2 class="panel-title" id="scheduleTitle">周排班</h2>
              <div class="schedule-actions">
                <div class="action-group">
                  <button data-schedule-menu="scheduleViewMenu">查看排班</button>
                  <div class="more-menu schedule-menu hidden" id="scheduleViewMenu">
                    <button id="currentWeekSchedule">本周排班</button>
                    <button id="nextWeekSchedule">下周排班</button>
                    <button id="customDateSchedule">自定义日期</button>
                  </div>
                </div>
                <div class="action-group">
                  <button data-schedule-menu="scheduleEditMenu">操作排班</button>
                  <div class="more-menu schedule-menu hidden" id="scheduleEditMenu">
                    <button id="editSchedule">编辑排班</button>
                    <button class="primary hidden" id="saveScheduleEdit">保存排班</button>
                    <button id="copyWeek">复制上周</button>
                  </div>
                </div>
                <div class="action-group">
                  <button data-schedule-menu="scheduleExportMenu">导出/分享</button>
                  <div class="more-menu schedule-menu hidden" id="scheduleExportMenu">
                    <button id="previewScheduleExport">预览导出效果</button>
                    <button id="exportSchedulePdf">导出PDF</button>
                    <button id="exportSchedulePng">导出PNG</button>
                  </div>
                </div>
                <div class="action-group">
                  <button class="icon" data-schedule-menu="scheduleDisplayMenu" title="显示设置">⚙</button>
                  <div class="more-menu schedule-menu display-settings-menu hidden" id="scheduleDisplayMenu">
                    <div class="density-controls">
                      <label>显示密度
                        <select id="scheduleDensity">
                          <option value="auto">自动适配</option>
                          <option value="comfortable">舒适</option>
                          <option value="standard">标准</option>
                          <option value="compact">紧凑</option>
                          <option value="ultra">超紧凑</option>
                        </select>
                      </label>
                      <label>行高
                        <input type="range" id="scheduleRowHeight" min="34" max="88" step="2" />
                      </label>
                      <label>字体
                        <input type="range" id="scheduleFontSize" min="10" max="16" step="1" />
                      </label>
                      <label>单元格宽度
                        <input type="range" id="scheduleCellWidth" min="72" max="150" step="2" />
                      </label>
                      <label>缩放
                        <input type="range" id="scheduleScale" min="80" max="110" step="5" />
                      </label>
                      <button id="fitSchedule">自动适配屏幕</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="panel-body export-preview hidden" id="scheduleExportPreview"></div>
            <div class="schedule-wrap">
              <table class="schedule" id="scheduleTable"></table>
            </div>
          </div>

        </div>
      </section>

      <section id="staffView" class="view hidden">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">人员管理</h2>
            <div class="week-tools" style="grid-template-columns: 1fr auto;">
              <input id="newEmployee" placeholder="新增员工姓名" />
              <button id="addEmployee">添加人员</button>
            </div>
          </div>
          <div class="panel-body">
            <div id="staffList"></div>
          </div>
        </div>
      </section>

      <section id="hoursView" class="view hidden">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">工时统计</h2>
            <div class="hint" id="hoursRangeLabel"></div>
          </div>
          <div class="panel-body">
            <div id="monthStats"></div>
          </div>
        </div>
      </section>

      <section id="salesView" class="view hidden">
        <div class="sales-layout">

  <script>
    const dayNames = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
    const dayKeys = ["mon", "tue", "wed", "thu", "fri", "sat", "sun"];
    const shiftOptions = [
      { value: "off", label: "休息", hours: 0 },
      { value: "full", label: "全天", hours: 8 },
      { value: "11-3", label: "11-3", hours: 4 },
      { value: "11-4", label: "11-4", hours: 5 },
      { value: "4-close", label: "4-close", hours: 5 },
      { value: "custom", label: "自定义", hours: 0 }
    ];

    const defaultEmployees = ["Bruce", "Henry", "Nana", "Roy", "Alin", "Megan", "Nia"];
    const storeKey = "restaurant-scheduler-v1";
    const systemConfig = {
      appName: "Capital Seafood CRM系统V1",
      featureFlags: {
        enablePayroll: false,
        enableLaborCost: false,
        enableCommission: false,
        enableBanquet: false,
        enableMember: false,
        enableInventory: false,
        enableDashboard: false,
        enablePOSSync: false,
        enableMultiStore: false
      },
      modules: {
        active: ["schedule", "staff", "hours", "sales"],
        future: ["payroll", "laborCost", "commission", "banquet", "member", "inventory", "dashboard", "posSync", "multiStore"]
      }
    };
    const reportSamples = [
      {
        id: "receipt-2026-06-17",

        grossSales: "2481.50",
        discounts: "0",

        deferredSales: "0",

        openOrders: "3",
        canceledOrders: "1",
        voidAmount: "0",

        source: "图片 1"
      },
      {
        id: "receipt-2026-06-18",

        grossSales: "2180.43",
        discounts: "-95.62",
        netSales: "2084.81",
        taxAmount: "161.67",
        grandTotal: "2246.48",
        tips: "206.28",
        guestCount: "0",
        lunchGuestCount: "0",
        dinnerGuestCount: "0",
        lunchSales: "0",
        dinnerSales: "0",
        serviceTips: "206.28",

      },
      {

        grossSales: "11761.70",
        discounts: "-64.76",
        netSales: "11696.94",

        lunchGuestCount: "0",

        lunchSales: "0",

        serviceTips: "2021.28",

        deferredSales: "0",

        closedOrders: "85",
        openOrders: "2",
        canceledOrders: "0",
        voidAmount: "0",
        voidItemCount: "0",
        source: "图片 3"
      }
    ];

    const startOfWeek = (date) => {
      const d = new Date(date);
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1);
      d.setHours(0, 0, 0, 0);
      return d;
    };

    const appToday = () => {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      return d;
    };
    const weekEnd = (date) => {
      const d = new Date(date);
      d.setDate(d.getDate() + 6);
      return d;
    };
    const iso = (date) => date.toISOString().slice(0, 10);
    const money = (n) => "$" + Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const num = (n) => Number(n || 0);

    const createEmptyWeek = () => {
      const employees = defaultEmployees.map((name) => ({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        name,
        shifts: Object.fromEntries(dayKeys.map((key) => [key, { type: "off", custom: "", actual: "" }]))
      }));
      employees[0].shifts.mon.type = "full";
      employees[0].shifts.wed.type = "full";
      employees[0].shifts.fri.type = "full";
      employees[0].shifts.sat.type = "full";
      employees[0].shifts.sun.type = "full";
      employees[1].shifts.mon.type = "full";
      employees[1].shifts.wed.type = "full";
      employees[1].shifts.thu.type = "full";
      employees[1].shifts.fri.type = "full";
      employees[1].shifts.sat.type = "4-close";
      employees[1].shifts.sun.type = "full";
      employees[2].shifts.tue.type = "full";
      employees[2].shifts.wed.type = "full";
      employees[2].shifts.thu.type = "full";
      employees[2].shifts.fri.type = "11-4";
      employees[2].shifts.sun.type = "full";
      employees[3].shifts.tue.type = "full";
      employees[3].shifts.sat.type = "full";
      employees[4].shifts.mon.type = "11-3";
      employees[4].shifts.tue.type = "11-3";
      employees[4].shifts.thu.type = "11-3";
      employees[4].shifts.sat.type = "11-3";
      employees[4].shifts.sun.type = "11-3";
      employees[5].shifts.fri.type = "full";
      employees[5].shifts.sat.type = "full";
      employees[5].shifts.sun.type = "full";
      employees[6].shifts.sat.type = "full";
      employees[6].shifts.sun.type = "full";
      return employees;
    };

    const createBlankWeek = () => defaultEmployees.map((name) => ({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
      name,
      shifts: Object.fromEntries(dayKeys.map((key) => [key, { type: "off", custom: "", actual: "" }]))
    }));

    const createPaperScheduleWeek = () => {
      const employees = createBlankWeek();
      const byName = Object.fromEntries(employees.map((emp) => [emp.name, emp]));
      const set = (name, day, type) => {
        if (byName[name]) byName[name].shifts[day].type = type;
      };
      set("Bruce", "mon", "full");
      set("Bruce", "wed", "full");
      set("Bruce", "fri", "full");
      set("Bruce", "sat", "full");
      set("Bruce", "sun", "full");

      set("Henry", "mon", "full");
      set("Henry", "wed", "full");
      set("Henry", "thu", "full");
      set("Henry", "fri", "full");
      set("Henry", "sat", "4-close");
      set("Henry", "sun", "full");

      set("Nana", "tue", "full");
      set("Nana", "wed", "full");
      set("Nana", "thu", "full");
      set("Nana", "fri", "11-4");
      set("Nana", "sun", "full");

      set("Roy", "tue", "full");
      set("Roy", "sat", "full");

      set("Alin", "mon", "11-3");
      set("Alin", "tue", "11-3");
      set("Alin", "thu", "11-3");
      set("Alin", "sat", "11-3");
      set("Alin", "sun", "11-3");

      set("Megan", "fri", "full");
      set("Megan", "sat", "full");
      set("Megan", "sun", "full");

      set("Nia", "sat", "full");
      set("Nia", "sun", "full");
      return employees;
    };

    const state = JSON.parse(localStorage.getItem(storeKey) || "null") || {
      currentWeek: iso(startOfWeek(appToday())),
      selectedDate: iso(appToday()),
      rangeStart: iso(startOfWeek(appToday())),
      rangeEnd: iso(weekEnd(startOfWeek(appToday()))),
      rangeMode: "week",
      dateLogicVersion: 8,
      config: systemConfig,
      schedules: {},
      sales: []
    };

    state.config = state.config || systemConfig;
    state.scheduleDisplay = state.scheduleDisplay || {
      density: "auto",
      rowHeight: window.innerWidth <= 720 ? 44 : 58,
      fontSize: window.innerWidth <= 720 ? 12 : 13,
      cellWidth: window.innerWidth <= 720 ? 88 : 106,
      scale: 100,
      employeeWidth: window.innerWidth <= 720 ? 96 : 124,
      manual: false
    };
    state.scheduleDisplay.density = state.scheduleDisplay.density || "auto";
    state.scheduleDisplay.employeeWidth = state.scheduleDisplay.employeeWidth || (window.innerWidth <= 720 ? 96 : 124);
    state.scheduleDisplay.manual = Boolean(state.scheduleDisplay.manual);

    if (state.dateLogicVersion !== 8) {
      const todayWeekDate = startOfWeek(appToday());
      const todayWeek = iso(todayWeekDate);
      state.rangeMode = "week";
      state.rangeStart = todayWeek;
      state.rangeEnd = iso(weekEnd(todayWeekDate));
      state.selectedDate = todayWeek;
      state.currentWeek = todayWeek;
      state.schedules[todayWeek] = createPaperScheduleWeek();
      state.dateLogicVersion = 8;
    }

    state.selectedDate = state.selectedDate || state.currentWeek || iso(new Date());
    state.rangeStart = state.rangeStart || state.selectedDate;
    state.rangeEnd = state.rangeEnd || state.selectedDate;
    state.rangeMode = state.rangeMode || "week";
    state.currentWeek = iso(startOfWeek(state.selectedDate));

    if (!state.schedules[state.currentWeek]) {
      state.schedules[state.currentWeek] = createBlankWeek();
    }

    let scheduleEditing = false;
    let hasUnsavedChanges = false;

    const save = () => localStorage.setItem(storeKey, JSON.stringify(state));
    const showToast = (message) => {
      const old = document.querySelector(".toast");
      if (old) old.remove();
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    };
    const updateScheduleSaveButton = () => {
      const btn = document.getElementById("saveScheduleEdit");
      btn.classList.toggle("hidden", !scheduleEditing);
      btn.textContent = hasUnsavedChanges ? "保存排班（未保存）" : "保存排班";
    };
    const densityPresets = {
      comfortable: { rowHeight: 78, fontSize: 15, cellWidth: 130, scale: 100 },
      standard: { rowHeight: 58, fontSize: 13, cellWidth: 106, scale: 100 },
      compact: { rowHeight: 44, fontSize: 12, cellWidth: 88, scale: 100 },
      ultra: { rowHeight: 36, fontSize: 11, cellWidth: 76, scale: 100 }
    };
    const closeScheduleMenus = () => {
      document.querySelectorAll(".schedule-menu").forEach((menu) => menu.classList.add("hidden"));
    };
    const applyScheduleDisplay = () => {
      const display = state.scheduleDisplay;
      document.documentElement.style.setProperty("--schedule-row-height", `${display.rowHeight}px`);
      document.documentElement.style.setProperty("--schedule-font", `${display.fontSize}px`);
      document.documentElement.style.setProperty("--employee-col-width", `${display.employeeWidth}px`);
      const density = document.getElementById("scheduleDensity");
      const row = document.getElementById("scheduleRowHeight");
      const font = document.getElementById("scheduleFontSize");
      const width = document.getElementById("scheduleCellWidth");
      const scale = document.getElementById("scheduleScale");
      if (density) density.value = display.density;
      if (row) row.value = display.rowHeight;
      if (font) font.value = display.fontSize;
      if (width) width.value = display.cellWidth;
      if (scale) scale.value = display.scale;
    };
    const autoScheduleDisplay = (dayCount) => {
      const wrap = document.querySelector(".schedule-wrap");
      const panel = document.querySelector("#scheduleView .panel");
      const wrapWidth = Math.max(320, wrap?.clientWidth || panel?.clientWidth || window.innerWidth - 40);
      const isMobile = window.innerWidth <= 720;
      const employeeWidth = Math.max(86, Math.min(150, state.scheduleDisplay.employeeWidth || (isMobile ? 96 : 124)));
      const available = wrapWidth - employeeWidth - 6;
      const fittedCellWidth = Math.floor(available / Math.max(1, dayCount));
      const cellWidth = Math.max(isMobile ? 74 : 82, Math.min(isMobile ? 92 : 118, fittedCellWidth));
      const veryTight = cellWidth < 84;
      const tight = cellWidth < 98 || isMobile;
      return {
        density: "auto",
        manual: false,
        employeeWidth,
        cellWidth,
        rowHeight: veryTight ? 36 : tight ? 42 : 52,
        fontSize: veryTight ? 11 : tight ? 12 : 13,
        scale: 100
      };
    };
    const setScheduleDensity = (density) => {
      if (density === "auto") {
        state.scheduleDisplay.manual = false;
      } else {
        state.scheduleDisplay = { ...state.scheduleDisplay, density, manual: true, ...densityPresets[density] };
      }
      applyScheduleDisplay();
      renderSchedule();
    };
    const updateScheduleDisplay = (key, value) => {
      state.scheduleDisplay.manual = true;
      if (state.scheduleDisplay.density === "auto") state.scheduleDisplay.density = "standard";
      state.scheduleDisplay[key] = Number(value);
      applyScheduleDisplay();
      renderSchedule();
    };
    const updateEmployeeWidth = (width) => {
      state.scheduleDisplay.employeeWidth = Math.max(86, Math.min(190, Number(width)));
      applyScheduleDisplay();
      renderSchedule();
    };
    const toDate = (value) => new Date(value + "T00:00:00");
    const addDays = (value, days) => {
      const d = typeof value === "string" ? toDate(value) : new Date(value);
      d.setDate(d.getDate() + days);
      return d;
    };
    const setCurrentWeekRange = () => {
      const start = startOfWeek(appToday());
      state.rangeMode = "week";
      state.rangeStart = iso(start);
      state.rangeEnd = iso(weekEnd(start));
      state.selectedDate = state.rangeStart;
      state.currentWeek = state.rangeStart;
      if (!state.schedules[state.currentWeek]) state.schedules[state.currentWeek] = createBlankWeek();
    };
    const selectedDateObj = () => toDate(state.selectedDate);
    const activeWeekStart = () => iso(startOfWeek(state.rangeStart || state.selectedDate));
    const activeDayIndex = (date = state.selectedDate) => {
      const day = toDate(date).getDay() || 7;
      return day - 1;
    };
    const syncRangeToMode = () => {
      const base = state.rangeStart || state.selectedDate;
      if (state.rangeMode === "day") {
        state.rangeEnd = base;
      }
      if (state.rangeMode === "week") {
        const start = startOfWeek(base);
        state.rangeStart = iso(start);
        state.rangeEnd = iso(addDays(start, 6));
      }
      if (state.rangeMode === "month") {
        const d = toDate(base);
        const start = new Date(d.getFullYear(), d.getMonth(), 1);
        const end = new Date(d.getFullYear(), d.getMonth() + 1, 0);
        state.rangeStart = iso(start);
        state.rangeEnd = iso(end);
      }
      state.selectedDate = state.rangeStart;
      state.currentWeek = iso(startOfWeek(state.rangeStart));
    };
    const dateItems = () => {
      const start = toDate(state.rangeStart);
      const end = toDate(state.rangeEnd);
      const items = [];
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        const date = iso(d);
        const dayIndex = activeDayIndex(date);
        items.push({ date, dayKey: dayKeys[dayIndex], dayName: dayNames[dayIndex] });
      }
      return items;
    };
    const rangeLabel = () => {
      const start = toDate(state.rangeStart);
      const end = toDate(state.rangeEnd);
      if (state.rangeStart === state.rangeEnd) return `${start.getMonth() + 1}/${start.getDate()} ${dayNames[activeDayIndex(state.rangeStart)]}`;
      return `${start.getMonth() + 1}/${start.getDate()} - ${end.getMonth() + 1}/${end.getDate()}`;
    };
    const recordsInRange = (records) => {
      const start = toDate(state.rangeStart);
      const end = toDate(state.rangeEnd);
      return records.filter((row) => {
        if (!row.date) return false;
        const d = toDate(row.date);
        return d >= start && d <= end;
      });
    };
    const salesInRange = () => recordsInRange(state.sales || []);
    const previousRangeSales = () => {
      const start = toDate(state.rangeStart);
      const end = toDate(state.rangeEnd);
      const days = Math.round((end - start) / 86400000) + 1;
      const prevStart = addDays(start, -days);
      const prevEnd = addDays(end, -days);
      return state.sales.filter((row) => {
        if (!row.date) return false;
        const d = toDate(row.date);
        return d >= prevStart && d <= prevEnd;
      });
    };
    const importReportSamples = () => {
      state.sales = state.sales || [];
      reportSamples.forEach((sample) => {
        state.sales = state.sales.filter((row) => row.date !== sample.date);
        state.sales.push({ ...sample });
      });
      state.sales.sort((a, b) => a.date.localeCompare(b.date));
      save();
    };
    const currentEmployees = () => state.schedules[state.currentWeek] || [];
    const weekKeyForDate = (date) => iso(startOfWeek(date));
    const ensureWeek = (weekKey) => {
      if (!state.schedules[weekKey]) state.schedules[weekKey] = createBlankWeek();
      return state.schedules[weekKey];
    };
    const employeeForDate = (baseEmp, date) => {
      const week = ensureWeek(weekKeyForDate(date));
      let emp = week.find((item) => item.id === baseEmp.id) || week.find((item) => item.name === baseEmp.name);
      if (!emp) {
        emp = {
          id: baseEmp.id,
          name: baseEmp.name,
          shifts: Object.fromEntries(dayKeys.map((key) => [key, { type: "off", custom: "", actual: "" }]))
        };
        week.push(emp);
      }
      return emp;
    };
    const shiftForDate = (baseEmp, item) => employeeForDate(baseEmp, item.date).shifts[item.dayKey];
    const shiftMeta = (type) => shiftOptions.find((s) => s.value === type) || shiftOptions[0];
    const plannedHours = (shift = { type: "off" }) => shift.type === "custom" ? num(shift.custom) : shiftMeta(shift.type).hours;
    const actualHours = (shift = { type: "off", actual: "" }) => shift.actual === "" ? plannedHours(shift) : num(shift.actual);
    const cellKey = (empId, dayKey) => `${empId}:${dayKey}`;
    const displayShift = (shift) => {
      const planned = plannedHours(shift);
      const actual = actualHours(shift);
      const changed = shift.actual !== "" && actual !== planned;
      if (shift.type === "off") return { main: "", detail: "", changed };

    const salesMetricLabels = {

    const summarizeSales = (sales) => sales.reduce((acc, row) => {
      Object.keys(salesMetricLabels).forEach((key) => acc[key] = (acc[key] || 0) + num(row[key]));

    }, {});
    const metricValue = (row, key) => num(row[key]);
    const formatMetric = (value, key) => key.includes("Orders") ? String(value || 0) : money(value);
    const avg = (amount, count) => count ? amount / count : 0;
    const weekNumber = (date) => {
      const d = toDate(date);
      const yearStart = new Date(d.getFullYear(), 0, 1);
      return Math.ceil((((d - yearStart) / 86400000) + yearStart.getDay() + 1) / 7);
    };
    const pivotKey = (row, dimension) => {
      if (dimension === "weekday") return dayNames[activeDayIndex(row.date)];
      if (dimension === "week") return `${toDate(row.date).getFullYear()} 第${weekNumber(row.date)}周`;
      if (dimension === "month") return row.date.slice(0, 7);
      return row.date;
    };
    const buildPivotRows = (current, previous, dimension, metric) => {
      const rows = new Map();
      const add = (label, side, value) => {
        if (!rows.has(label)) rows.set(label, { label, current: 0, previous: 0 });
        rows.get(label)[side] += value;
      };
      current.forEach((row) => add(pivotKey(row, dimension), "current", metricValue(row, metric)));
      previous.forEach((row) => add(pivotKey(row, dimension), "previous", metricValue(row, metric)));
      return [...rows.values()].sort((a, b) => String(a.label).localeCompare(String(b.label)));
    };
    const salesFieldAliases = {
      date: ["date", "日期", "from", "printed at"],
      grossSales: ["gross sales", "营业额", "总营业额"],
      discounts: ["discounts", "折扣"],
      netSales: ["net sales", "净销售"],
      taxAmount: ["tax amount", "税额"],
      grandTotal: ["grand total", "含税合计"],
      tips: ["tips", "小费"],
      salesRevenue: ["sales revenue", "总收入", "业绩收入"],
      guestCount: ["客流人数", "客流", "guests"],
      lunchGuestCount: ["午市客流"],
      dinnerGuestCount: ["晚市客流"],
      lunchSales: ["午市营业额"],
      dinnerSales: ["晚市营业额"],
      deferredSales: ["deferred sales", "延期销售"],
      totalAmount: ["total amount", "总金额"],
      closedOrders: ["closed orders", "已结订单"],
      openOrders: ["open orders", "未结订单"],
      canceledOrders: ["canceled orders", "取消订单"],
      voidAmount: ["void amount", "作废金额"],

    };
    const normalizeHeader = (value) => String(value || "").trim().toLowerCase();
    const matchSalesField = (header) => {
      const h = normalizeHeader(header);
      return Object.keys(salesFieldAliases).find((field) => salesFieldAliases[field].some((alias) => h.includes(alias.toLowerCase())));
    };
    const upsertSalesRow = (row) => {

        if (choice === "1") state.sales = state.sales.filter((item) => item.date !== row.date).concat(row);
        else if (choice === "2") {
          Object.keys(salesMetricLabels).forEach((key) => existing[key] = String(num(existing[key]) + num(row[key])));
          existing.source = "POS合并导入";
        }
        else return;

        state.sales.push(row);

      save();

    };
    const importRows = (rows) => {
      rows.forEach((raw) => {
        const row = { id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()), source: "POS导入" };
        Object.keys(raw).forEach((header) => {
          const field = matchSalesField(header);
          if (field) row[field] = String(raw[header] ?? "");

    const scheduleExportName = (ext) => `Capital-Seafood-Schedule-${state.rangeStart}.${ext}`;

      const height = headerH + employees.length * rowH + 34;

      canvas.width = Math.max(width, 1100);
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#14251c";
      ctx.font = "bold 28px Arial";
      ctx.fillText("Capital Seafood 本周排班表", 20, 38);
      ctx.font = "16px Arial";
      ctx.fillText(`${state.rangeStart.replaceAll("-", "/")} - ${state.rangeEnd.replaceAll("-", "/")}`, 20, 66);
      ctx.strokeStyle = "#c5d0c0";
      ctx.lineWidth = 1;
      ctx.font = "bold 14px Arial";
      ctx.fillStyle = "#e9b949";

          resizer.classList.remove("is-dragging");

                <input class="actual" data-action="actual" data-emp="${targetEmp.id}" data-date="${item.date}" data-day="${item.dayKey}" type="number" min="0" step="0.5" value="${shift.actual || ""}" placeholder="实际小时，空=按计划" />

                </div>
              </div>
              `}
            </div>
          </td>`;
        }).join("");
        return `<tr>
          <td class="employee-cell">

    function renderWeekSummary() {

      const workingDays = items.map((item) => employees.filter((emp) => plannedHours(shiftForDate(emp, item)) > 0).length);
      const busiest = workingDays.reduce((best, count, i) => count > best.count ? { count, i } : best, { count: 0, i: 0 });

        items.forEach((item) => {

          rows[emp.name].planned += planned;

    function getShiftFromText(text) {
      const lower = text.toLowerCase();
      if (text.includes("休") || lower.includes("off")) return "off";
      if (text.includes("全天") || text.includes("全日") || lower.includes("work")) return "full";
      if (lower.includes("4-close") || lower.includes("4 close") || text.includes("4到关门")) return "4-close";
      if (text.includes("11-4") || text.includes("11到4")) return "11-4";
      if (text.includes("11-3") || text.includes("11到3")) return "11-3";
      return null;
    }

    function applyNaturalCommand(raw) {
      const text = raw.replaceAll("星期", "周").replaceAll("礼拜", "周");
      const clauses = text.split(/[，,。；;\n]+/).map((item) => item.trim()).filter(Boolean);
      const employees = currentEmployees();
      let updates = 0;
      clauses.forEach((clause) => {
        employees.forEach((emp) => {
          if (!clause.toLowerCase().includes(emp.name.toLowerCase())) return;
          dayNames.forEach((day, i) => {
            if (!clause.includes(day) && !clause.includes(day.replace("周", ""))) return;
            const shift = getShiftFromText(clause);
            if (shift) {
              emp.shifts[dayKeys[i]].type = shift;
              emp.shifts[dayKeys[i]].actual = "";
              updates += 1;
            }
          });
        });
      });
      renderSchedule();
      alert(updates ? `已更新 ${updates} 个班次` : "没有识别到可更新的班次，请试试：Bruce 周一全天");

      `}).join("") + `<div class="hint">绿色为当前范围，黄色为上一周期。当前项目：${salesMetricLabels[metric]}</div>${trendHtml}` : `<div class="empty">没有可分析的数据。</div>`;

      document.getElementById("pivotTable").innerHTML = pivotRows.length ? `
        <thead><tr><th>维度</th><th>当前范围</th><th>上一周期</th><th>差额</th><th>变化</th></tr></thead>
        <tbody>${pivotRows.map((row) => {
          const diff = row.current - row.previous;
          const pct = row.previous ? `${(diff / row.previous * 100).toFixed(1)}%` : "-";
          return `<tr>
            <td>${row.label}</td>
            <td>${formatMetric(row.current, metric)}</td>
            <td>${formatMetric(row.previous, metric)}</td>
            <td style="color:${diff >= 0 ? "var(--green)" : "var(--red)"}">${formatMetric(diff, metric)}</td>
            <td>${pct}</td>
          </tr>`;
        }).join("")}</tbody>
      ` : "";

      document.getElementById("salesTable").innerHTML = `
        <thead><tr><th>日期</th><th>营业额</th><th>客流</th><th>客单价</th><th>午市营业额</th><th>午市客流</th><th>午市客单价</th><th>晚市营业额</th><th>晚市客流</th><th>晚市客单价</th><th>折扣</th><th>净销售</th><th>税额</th><th>含税合计</th><th>小费</th><th>业绩收入</th><th>延期销售</th><th>总金额</th><th>已结订单</th><th>未结订单</th><th>取消订单</th><th>作废金额</th><th>作废数量</th><th></th></tr></thead>
        <tbody>${sales.map((s, i) => {
          return `<tr>
            <td>${s.date}</td><td>${money(s.grossSales)}</td><td>${s.guestCount || 0}</td><td>${money(avg(num(s.grossSales), num(s.guestCount)))}</td><td>${money(s.lunchSales)}</td><td>${s.lunchGuestCount || 0}</td><td>${money(avg(num(s.lunchSales), num(s.lunchGuestCount)))}</td><td>${money(s.dinnerSales)}</td><td>${s.dinnerGuestCount || 0}</td><td>${money(avg(num(s.dinnerSales), num(s.dinnerGuestCount)))}</td><td>${money(s.discounts)}</td><td>${money(s.netSales)}</td><td>${money(s.taxAmount)}</td><td>${money(s.grandTotal)}</td><td>${money(s.tips)}</td><td>${money(s.salesRevenue)}</td><td>${money(s.deferredSales)}</td><td>${money(s.totalAmount || s.salesRevenue)}</td><td>${s.closedOrders || 0}</td><td>${s.openOrders || 0}</td><td>${s.canceledOrders || 0}</td><td>${money(s.voidAmount)}</td><td>${s.voidItemCount || 0}</td>
            <td><button class="danger" data-sales-remove="${s.id}">删除</button></td>
          </tr>`;
        }).join("")}</tbody>`;
    }

    document.getElementById("scheduleTable").addEventListener("change", (event) => {
      const target = event.target;
      const action = target.dataset.action;
      if (!action) return;
      const week = ensureWeek(weekKeyForDate(target.dataset.date || state.rangeStart));
      const emp = week.find((item) => item.id === target.dataset.emp);
      if (!emp) return;
      const shift = emp.shifts[target.dataset.day];
      if (action === "shift") shift.type = target.value;
      if (action === "custom") shift.custom = target.value;
      if (action === "actual") shift.actual = target.value;
      hasUnsavedChanges = true;
      updateScheduleSaveButton();
    });

    document.getElementById("addEmployee").addEventListener("click", () => {
      const input = document.getElementById("newEmployee");
      const name = input.value.trim();
      if (!name) return;
      currentEmployees().push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        name,
        shifts: Object.fromEntries(dayKeys.map((key) => [key, { type: "off", custom: "", actual: "" }]))
      });
      input.value = "";
      renderSchedule();
    });

    document.getElementById("staffList").addEventListener("change", (event) => {
      const input = event.target.closest("[data-staff-name]");
      if (!input) return;
      const emp = currentEmployees().find((item) => item.id === input.dataset.staffName);
      if (emp) emp.name = input.value.trim() || emp.name;
      renderSchedule();
    });

    document.getElementById("staffList").addEventListener("click", (event) => {
      const btn = event.target.closest("[data-staff-remove]");
      if (!btn) return;
      state.schedules[state.currentWeek] = currentEmployees().filter((emp) => emp.id !== btn.dataset.staffRemove);
      renderSchedule();
    });

    rangeModeSelect.addEventListener("change", () => {
      state.rangeMode = rangeModeSelect.value;
      if (state.rangeMode === "week") {
        setCurrentWeekRange();
        scheduleEditing = false;
        renderSchedule();
        renderMonthStats();
        renderSales();
        return;
      }
      state.rangeStart = rangeStartInput.value || state.rangeStart;
      syncRangeToMode();
      if (!state.schedules[state.currentWeek]) state.schedules[state.currentWeek] = createBlankWeek();
      renderSchedule();
      renderMonthStats();
      renderSales();
    });

    rangeStartInput.addEventListener("change", () => {
      state.rangeStart = rangeStartInput.value;
      if (state.rangeMode !== "custom") syncRangeToMode();
      if (state.rangeMode === "custom" && (!state.rangeEnd || toDate(state.rangeEnd) < toDate(state.rangeStart))) state.rangeEnd = state.rangeStart;
      renderSchedule();
      renderMonthStats();
      renderSales();
    });

    rangeEndInput.addEventListener("change", () => {
      state.rangeEnd = rangeEndInput.value;
      state.rangeMode = "custom";
      if (toDate(state.rangeEnd) < toDate(state.rangeStart)) state.rangeStart = state.rangeEnd;
      renderSchedule();
      renderMonthStats();
      renderSales();
    });

    document.querySelectorAll("[data-schedule-menu]").forEach((btn) => btn.addEventListener("click", (event) => {
      event.stopPropagation();
      const menu = document.getElementById(btn.dataset.scheduleMenu);
      const willOpen = menu.classList.contains("hidden");
      closeScheduleMenus();
      if (willOpen) menu.classList.remove("hidden");
    }));

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".action-group")) closeScheduleMenus();
      if (!event.target.closest(".sales-head-actions")) document.getElementById("salesImportMenu").classList.add("hidden");
    });

    document.getElementById("scheduleDensity").addEventListener("change", (event) => setScheduleDensity(event.target.value));
    document.getElementById("scheduleRowHeight").addEventListener("input", (event) => updateScheduleDisplay("rowHeight", event.target.value));
    document.getElementById("scheduleFontSize").addEventListener("input", (event) => updateScheduleDisplay("fontSize", event.target.value));
    document.getElementById("scheduleCellWidth").addEventListener("input", (event) => updateScheduleDisplay("cellWidth", event.target.value));
    document.getElementById("scheduleScale").addEventListener("input", (event) => updateScheduleDisplay("scale", event.target.value));
    document.getElementById("fitSchedule").addEventListener("click", () => {
      state.scheduleDisplay.manual = false;
      state.scheduleDisplay.density = "auto";
      applyScheduleDisplay();
      renderSchedule();
    });

    let scheduleResizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(scheduleResizeTimer);
      scheduleResizeTimer = setTimeout(() => {
        if (!document.getElementById("scheduleView").classList.contains("hidden")) renderSchedule();
      }, 120);
    });

    document.getElementById("currentWeekSchedule").addEventListener("click", () => {
      closeScheduleMenus();
      setCurrentWeekRange();
      scheduleEditing = false;
      hasUnsavedChanges = false;
      renderSchedule();
      renderMonthStats();
      renderSales();
    });

    document.getElementById("nextWeekSchedule").addEventListener("click", () => {
      closeScheduleMenus();
      const start = addDays(startOfWeek(appToday()), 7);
      state.rangeMode = "week";
      state.rangeStart = iso(start);
      state.rangeEnd = iso(addDays(start, 6));
      state.selectedDate = state.rangeStart;
      state.currentWeek = weekKeyForDate(state.rangeStart);
      ensureWeek(state.currentWeek);
      scheduleEditing = true;
      hasUnsavedChanges = false;
      renderSchedule();
      renderMonthStats();
      renderSales();
    });

    document.getElementById("customDateSchedule").addEventListener("click", () => {
      closeScheduleMenus();
      state.rangeMode = "custom";
      rangeModeSelect.value = "custom";
      rangeStartInput.focus();
      renderSchedule();
      showToast("请选择开始和结束日期");
    });

    document.getElementById("editSchedule").addEventListener("click", () => {
      closeScheduleMenus();
      scheduleEditing = true;
      hasUnsavedChanges = false;
      renderSchedule();
    });

    document.getElementById("saveScheduleEdit").addEventListener("click", () => {
      closeScheduleMenus();
      scheduleEditing = false;
      hasUnsavedChanges = false;
      save();
      renderSchedule();
      renderMonthStats();
      showToast("保存成功");
    });

    document.getElementById("exportSchedulePng").addEventListener("click", () => {
      closeScheduleMenus();
      downloadCanvas(drawScheduleCanvas(), scheduleExportName("png"));
    });

    document.getElementById("exportSchedulePdf").addEventListener("click", () => {
      closeScheduleMenus();
      const canvas = drawScheduleCanvas();
      const img = canvas.toDataURL("image/png");
      if (window.jspdf?.jsPDF) {
        const pdf = new window.jspdf.jsPDF({ orientation: "landscape", unit: "pt", format: "a4" });
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
        const ratio = Math.min((pageW - 32) / canvas.width, (pageH - 32) / canvas.height);
        pdf.addImage(img, "PNG", 16, 16, canvas.width * ratio, canvas.height * ratio);
        pdf.save(scheduleExportName("pdf"));
      } else {
        downloadCanvas(canvas, scheduleExportName("png"));
        showToast("PDF组件未加载，已先导出PNG");
      }
    });

    document.getElementById("previewScheduleExport").addEventListener("click", () => {
      closeScheduleMenus();
      const canvas = drawScheduleCanvas();
      const preview = document.getElementById("scheduleExportPreview");
      preview.classList.remove("hidden");
      preview.innerHTML = `<img alt="排班导出预览" src="${canvas.toDataURL("image/png")}" />`;
    });

    document.getElementById("copyWeek").addEventListener("click", () => {
      closeScheduleMenus();
      const current = new Date(state.currentWeek + "T00:00:00");
      current.setDate(current.getDate() - 7);
      const prevKey = iso(current);
      if (state.schedules[prevKey]) {
        state.schedules[state.currentWeek] = JSON.parse(JSON.stringify(state.schedules[prevKey]));
        renderSchedule();
      } else {
        alert("没有找到上周排班。");
      }
    });

    document.querySelectorAll(".nav button").forEach((btn) => btn.addEventListener("click", () => {
      document.querySelectorAll(".nav button").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".view").forEach((view) => view.classList.add("hidden"));
      document.getElementById(btn.dataset.view + "View").classList.remove("hidden");
      document.querySelector(".sidebar").classList.remove("open");
      document.getElementById("mobileBackdrop").classList.remove("open");
      if (btn.dataset.view === "schedule") {
        setCurrentWeekRange();
        scheduleEditing = false;
        renderSchedule();
      }
      const titles = {
        schedule: ["Capital Seafood CRM系统V1", "按日期查看周排班或下周排班，支持直接编辑排班。"],
        staff: ["人员管理", "集中添加、修改或删除员工，排班表保持干净。"],
        hours: ["工时统计", "按当前选择的日或周统计每位员工的计划与实际工时。"],
        sales: ["业绩报表", "按当前日期范围查看小票数据，生成周报、月报和趋势对比。"]
      };
      document.getElementById("pageTitle").textContent = titles[btn.dataset.view][0];
      document.getElementById("pageSubtitle").textContent = titles[btn.dataset.view][1];
      renderMonthStats();
      renderStaffList();
      renderSales();
    }));

    document.getElementById("menuToggle").addEventListener("click", () => {
      document.querySelector(".sidebar").classList.add("open");
      document.getElementById("mobileBackdrop").classList.add("open");
    });

    document.getElementById("mobileBackdrop").addEventListener("click", () => {
      document.querySelector(".sidebar").classList.remove("open");
      document.getElementById("mobileBackdrop").classList.remove("open");
    });

    document.getElementById("moreActions").addEventListener("click", (event) => {
      event.stopPropagation();
      document.getElementById("moreMenu").classList.toggle("hidden");
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".actions")) document.getElementById("moreMenu").classList.add("hidden");
    });

    document.getElementById("addSales").addEventListener("click", () => {
      const row = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        date: document.getElementById("salesDate").value,
        grossSales: document.getElementById("grossSales").value,
        discounts: document.getElementById("discounts").value,
        netSales: document.getElementById("netSales").value,
        taxAmount: document.getElementById("taxAmount").value,
        grandTotal: document.getElementById("grandTotal").value,
        tips: document.getElementById("tips").value,
        salesRevenue: document.getElementById("salesRevenue").value,
        guestCount: document.getElementById("guestCount").value,
        lunchGuestCount: document.getElementById("lunchGuestCount").value,
        dinnerGuestCount: document.getElementById("dinnerGuestCount").value,
        lunchSales: document.getElementById("lunchSales").value,
        dinnerSales: document.getElementById("dinnerSales").value,
        deferredSales: document.getElementById("deferredSales").value,
        totalAmount: document.getElementById("totalAmount").value,
        closedOrders: document.getElementById("closedOrders").value,
        openOrders: document.getElementById("openOrders").value,
        canceledOrders: document.getElementById("canceledOrders").value,
        voidAmount: document.getElementById("voidAmount").value,
        voidItemCount: document.getElementById("voidItemCount").value,
        source: "手动录入"
      };
      state.sales = state.sales.filter((s) => s.date !== row.date);
      state.sales.push(row);
      save();
      renderSales();
    });

    document.getElementById("sampleSales").addEventListener("click", () => {
      document.getElementById("salesDate").value = "2026-06-21";
      document.getElementById("grossSales").value = "17527.98";
      document.getElementById("discounts").value = "-418.89";
      document.getElementById("netSales").value = "17109.09";
      document.getElementById("taxAmount").value = "1326.42";
      document.getElementById("grandTotal").value = "18435.51";
      document.getElementById("tips").value = "3461.54";
      document.getElementById("salesRevenue").value = "21897.05";
      document.getElementById("guestCount").value = "0";
      document.getElementById("lunchGuestCount").value = "0";
      document.getElementById("dinnerGuestCount").value = "0";
      document.getElementById("lunchSales").value = "0";
      document.getElementById("dinnerSales").value = "0";
      document.getElementById("deferredSales").value = "0";
      document.getElementById("totalAmount").value = "21897.05";
      document.getElementById("closedOrders").value = "107";
      document.getElementById("openOrders").value = "5";
      document.getElementById("canceledOrders").value = "1";
      document.getElementById("voidAmount").value = "0";
      document.getElementById("voidItemCount").value = "0";
    });

    document.getElementById("importReportSamples").addEventListener("click", () => {
      importReportSamples();
      renderSales();
      alert("已导入 6/17、6/18、6/19 三张报表。");
    });

    document.getElementById("salesImportMenuBtn").addEventListener("click", (event) => {
      event.stopPropagation();
      document.getElementById("salesImportMenu").classList.toggle("hidden");
    });

    document.getElementById("excelImportBtn").addEventListener("click", () => {
      document.getElementById("salesImportMenu").classList.add("hidden");
      const input = document.getElementById("posFileInput");
      input.accept = ".csv,.xlsx,.xls";
      input.click();
    });

    document.getElementById("imageImportBtn").addEventListener("click", () => {
      document.getElementById("salesImportMenu").classList.add("hidden");
      const input = document.getElementById("posFileInput");
      input.accept = "image/*";
      input.click();
    });

    document.getElementById("manualSalesBtn").addEventListener("click", () => {
      document.getElementById("salesImportMenu").classList.add("hidden");
      const panel = document.getElementById("manualSalesPanel");
      panel.classList.toggle("hidden");
      if (!panel.classList.contains("hidden")) document.getElementById("salesDate").focus();
    });

    document.getElementById("posFileInput").addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const preview = document.getElementById("importPreview");
      preview.innerHTML = "";
      if (file.type.startsWith("image/")) {
        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        preview.innerHTML = `<div class="pivot-note">图片已上传预览。OCR识别接口已预留，当前版本先保留图片，后续可接自动识别。</div>`;
        preview.appendChild(img);
        event.target.value = "";
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          if (file.name.toLowerCase().endsWith(".csv")) {
            const text = e.target.result;
            const lines = text.split(/\r?\n/).filter(Boolean);
            const headers = lines.shift().split(",").map((h) => h.trim());
            const rows = lines.map((line) => Object.fromEntries(line.split(",").map((cell, i) => [headers[i], cell.trim()])));
            importRows(rows);
          } else if (window.XLSX) {
            const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
            const sheet = wb.Sheets[wb.SheetNames[0]];
            importRows(XLSX.utils.sheet_to_json(sheet));
          } else {
            showToast("Excel组件未加载，请先转CSV导入");
          }
        } catch (err) {
          showToast("导入失败，请检查文件格式");
        }
      };
      if (file.name.toLowerCase().endsWith(".csv")) reader.readAsText(file);
      else reader.readAsArrayBuffer(file);
      event.target.value = "";
    });

    document.getElementById("salesTable").addEventListener("click", (event) => {
      const btn = event.target.closest("[data-sales-remove]");
      if (!btn) return;
      state.sales = state.sales.filter((s) => s.id !== btn.dataset.salesRemove);
      save();
      renderSales();
    });

    document.querySelectorAll("[data-sales-panel]").forEach((btn) => btn.addEventListener("click", () => {
      document.querySelectorAll("[data-sales-panel]").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("salesDetailPanel").classList.toggle("hidden", btn.dataset.salesPanel !== "detail");
      document.getElementById("salesSummaryPanel").classList.toggle("hidden", btn.dataset.salesPanel !== "summary");
      document.getElementById("salesAnalysisPanel").classList.toggle("hidden", btn.dataset.salesPanel !== "analysis");
      renderSales();
    }));

    document.getElementById("analysisMetric").addEventListener("change", renderSales);
    document.getElementById("pivotDimension").addEventListener("change", renderSales);

    document.getElementById("saveBtn").addEventListener("click", () => {
      save();
      showToast("已保存到当前浏览器");
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "restaurant-schedule-sales.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    document.getElementById("importDataBtn").addEventListener("click", () => document.getElementById("importDataFile").click());

    document.getElementById("importDataFile").addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          localStorage.setItem(storeKey, JSON.stringify(imported));
          showToast("导入完成，页面将刷新");
          setTimeout(() => location.reload(), 800);
        } catch (err) {
          showToast("导入失败，请选择正确的数据文件");
        }
      };
      reader.readAsText(file);
    });

    document.getElementById("clearDataBtn").addEventListener("click", () => {
      if (!confirm("确定清空本地数据吗？此操作不能撤销。")) return;
      localStorage.removeItem(storeKey);
      showToast("已清空，页面将刷新");
      setTimeout(() => location.reload(), 800);
    });

    renderSchedule();
    renderMonthStats();
    renderSales();
  </script>
</body>
</html>
